<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h1 class="text-center mb-4">Galería de Productos</h1>

<div class="row mb-4">

<div class="col-md-3">
<select class="form-select">
<option>Categoría</option>
<option>Electrónica</option>
<option>Ropa</option>
<option>Calzado</option>
</select>
</div>

<div class="col-md-3">
<select class="form-select">
<option>Marca</option>
<option>Samsung</option>
<option>Nike</option>
<option>Adidas</option>
</select>
</div>

<div class="col-md-3">
<select class="form-select">
<option>Precio</option>
<option>Menor a mayor</option>
<option>Mayor a menor</option>
</select>
</div>

<div class="col-md-3">
<select class="form-select">
<option>Ordenar por</option>
<option>Popularidad</option>
<option>Relevancia</option>
</select>
</div>

</div>

<div class="row">

<div class="col-md-4 mb-4">
<div class="card">
<span class="badge bg-danger m-2">Descuento</span>
<img src="img/Samsung-Galaxy-S26-Ultra.jpg" class="card-img-top" alt="Samsung">
<div class="card-body">
<h5>Samsung Galaxy</h5>
<p>$8,999</p>
<button class="btn btn-primary">Agregar al carrito</button>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<span class="badge bg-success m-2">Nuevo</span>
<img src="img/playera-nike.jpg" class="card-img-top" alt="Nike">
<div class="card-body">
<h5>Playera Nike</h5>
<p>$599</p>
<button class="btn btn-primary">Agregar al carrito</button>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<span class="badge bg-warning text-dark m-2">Popular</span>
<img src="img/adidas.jpg" class="card-img-top" alt="Adidas">
<div class="card-body">
<h5>Tenis Adidas</h5>
<p>$1,299</p>
<button class="btn btn-primary">Agregar al carrito</button>
</div>
</div>
</div>

</div>

<nav>
<ul class="pagination justify-content-center">

<li class="page-item">
<a class="page-link">1</a>
</li>

<li class="page-item">
<a class="page-link">2</a>
</li>

<li class="page-item">
<a class="page-link">3</a>
</li>

</ul>
</nav>

</div>

</body>
</html>
