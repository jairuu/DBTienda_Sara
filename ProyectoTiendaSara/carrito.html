<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carrito</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h1 class="mb-4">Carrito de Compras</h1>

<table class="table table-bordered">

<thead class="table-primary">

<tr>
<th>Imagen</th>
<th>Producto</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Subtotal</th>
<th>Eliminar</th>
</tr>

</thead>

<tbody>

<tr>
<td><img src="img/Samsung-Galaxy-S26-Ultra.jpg" width="80" alt="Samsung">
<td>Samsung Galaxy</td>
<td>$8,999</td>
<td><input type="number" value="1" class="form-control"></td>
<td>$8,999</td>
<td><button class="btn btn-danger">X</button></td>
</tr>

<tr>
<td><img src="img/adidas.jpg" width="80" alt="Adidas">
<td>Tenis Adidas</td>
<td>$1,299</td>
<td><input type="number" value="2" class="form-control"></td>
<td>$2,598</td>
<td><button class="btn btn-danger">X</button></td>
</tr>

</tbody>

</table>

<div class="row">

<div class="col-md-6">

<h4>Cupón de descuento</h4>

<div class="input-group">
<input class="form-control" placeholder="Código">
<button class="btn btn-success">Aplicar</button>
</div>

<h4 class="mt-4">Método de envío</h4>

<select class="form-select">
<option>Envío estándar</option>
<option>Envío express</option>
</select>

</div>

<div class="col-md-6">

<div class="card">

<div class="card-body">

<h4>Resumen del Pedido</h4>

<p>Subtotal: $11,597</p>
<p>Impuestos: $1,855</p>
<p>Envío: $150</p>

<hr>

<h3>Total: $13,602</h3>

<button class="btn btn-primary w-100 mb-2">
Proceder al Pago
</button>

<button class="btn btn-outline-secondary w-100">
Seguir Comprando
</button>

</div>
</div>

</div>

</div>

</div>

</body>
</html>
