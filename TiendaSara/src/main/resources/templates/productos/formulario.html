<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Formulario Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/web">Tienda Sara</a>
            <div>
                <a href="/web/productos" class="btn btn-outline-light btn-sm">Productos</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0" th:text="${titulo}"></h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/web/productos/guardar}" 
                              th:object="${productoDto}" 
                              method="post">
                            
                            <input type="hidden" th:field="*{id}"/>
                            
                            <div class="mb-3">
                                <label class="form-label">Descripción *</label>
                                <input type="text" class="form-control" th:field="*{descripcion}" required maxlength="150">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Precio *</label>
                                <input type="number" class="form-control" th:field="*{precio}" required step="0.01" min="0.01">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Stock *</label>
                                <input type="number" class="form-control" th:field="*{cantidad}" required min="0">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Categoría *</label>
                                <select class="form-select" th:field="*{idCategoria}" required>
                                    <option value="">Seleccione categoría</option>
                                    <option th:each="cat : ${categorias}" 
                                            th:value="${cat.id}" 
                                            th:text="${cat.descripcion}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Marca *</label>
                                <select class="form-select" th:field="*{idMarca}" required>
                                    <option value="">Seleccione marca</option>
                                    <option th:each="mar : ${marcas}" 
                                            th:value="${mar.id}" 
                                            th:text="${mar.descripcion}"></option>
                                </select>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/web/productos" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">
                                    <span th:text="${modo == 'crear'} ? 'Guardar' : 'Actualizar'"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
