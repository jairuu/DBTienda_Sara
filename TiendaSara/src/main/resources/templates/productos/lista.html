<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/web">Tienda Sara</a>
            <div>
                <a href="/web/productos" class="btn btn-outline-light btn-sm">Productos</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${mensaje}" class="alert" 
             th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : 'alert-danger'">
            <span th:text="${mensaje}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Lista de Productos</h2>
            <a href="/web/productos/nuevo" class="btn btn-success">
                <i class="bi bi-plus-lg"></i> Nuevo Producto
            </a>
        </div>

        <div class="card" th:if="${!productos.empty}">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Descripción</th>
                                <th>Categoría</th>
                                <th>Marca</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="producto : ${productos}">
                                <td><span class="badge bg-secondary" th:text="${producto.id}"></span></td>
                                <td th:text="${producto.descripcion}"></td>
                                <td><span class="badge bg-info" th:text="${producto.categoria?.descripcion}"></span></td>
                                <td><span class="badge bg-warning" th:text="${producto.marca?.descripcion}"></span></td>
                                <td th:text="'$' + ${producto.precio}"></td>
                                <td th:text="${producto.cantidad}"></td>
                                <td>
                                    <a th:href="@{/web/productos/ver/{id}(id=${producto.id})}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/web/productos/editar/{id}(id=${producto.id})}" 
                                       class="btn btn-sm btn-outline-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/web/productos/eliminar/{id}(id=${producto.id})}" 
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('¿Estás seguro de eliminar este producto?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="text-center py-5" th:if="${productos.empty}">
            <h3 class="text-muted">No hay productos disponibles</h3>
            <a href="/web/productos/nuevo" class="btn btn-success">Agregar Primer Producto</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
